<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des types de visa</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo-removebg.png}">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="page-shell">
        <div class="hero">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div>
                    <div class="pill">Type Visa</div>
                    <h1 class="mt-3">Liste des types de visa</h1>
                    <p class="lead mb-0">Vue simple pour consulter les types de visa disponibles.</p>
                </div>
                <a class="back-link" th:href="@{/}">Retour a l'accueil</a>
            </div>
        </div>

        <div class="card-surface">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                <h2 class="h5 mb-0">Tableau</h2>
                <a class="btn btn-outline-success btn-sm" th:href="@{/type-visa}">Recharger</a>
            </div>
            <div class="table-responsive mt-3">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Libelle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="typeVisa : ${types}">
                            <td th:text="${typeVisa.idTypeVisa}">TV-001</td>
                            <td th:text="${typeVisa.libelle}">Exemple</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="status" th:if="${#lists.isEmpty(types)}">Aucun type de visa trouve.</div>
            <div class="status" th:unless="${#lists.isEmpty(types)}" th:text="|${types.size()} element(s) charge(s).|">0 element(s) charge(s).</div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
